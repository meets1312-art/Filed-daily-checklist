<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EOD Field Sign-Off</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f4f1eb; color: #1a1a1a; font-family: 'DM Mono', monospace; min-height: 100vh; padding-bottom: 90px; }
  .header { background: #1a1a2e; color: #f0c040; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; }
  .header-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
  .header-date { font-size: 11px; color: #888aaa; margin-top: 2px; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .prog-bg { flex: 1; height: 5px; background: #333; border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; background: #f0c040; border-radius: 99px; transition: width 0.35s ease; }
  .prog-text { font-size: 11px; color: #f0c040; min-width: 40px; text-align: right; }

  /* PROJECT BAR */
  .project-bar { background: #22263a; padding: 10px 16px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #2e3350; }
  .project-input { flex: 1; background: #1a1a2e; border: 1px solid #3a3f5a; border-radius: 7px; color: #e0e0f0; font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 10px; outline: none; }
  .project-input::placeholder { color: #555; }
  .project-input:focus { border-color: #f0c040; }
  .project-label { font-size: 10px; color: #555; white-space: nowrap; }

  .cat-block { margin: 14px 14px 0; }
  .cat-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #888; margin-bottom: 6px; padding-left: 2px; }
  .item-row { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 7px; overflow: hidden; min-height: 54px; }
  .item-row.signed { background: #f0faf4; border-color: #a8d5b5; }
  .item-info { flex: 1; padding: 10px 12px; }
  .item-name { font-size: 13px; font-weight: 500; line-height: 1.3; color: #1a1a1a; }
  .item-row.signed .item-name { color: #888; }
  .item-sub { font-size: 10px; color: #aaa; margin-top: 2px; }
  .initials-box { width: 58px; height: 54px; border-left: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; background: #fafafa; transition: background 0.15s; -webkit-tap-highlight-color: transparent; gap: 2px; }
  .item-row.signed .initials-box { background: #e0f5e9; border-left-color: #a8d5b5; }
  .initials-box:active { background: #f0e8c8; }
  .initials-text { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: #1a1a2e; letter-spacing: 0.5px; text-align: center; }
  .initials-time { font-size: 9px; color: #888; text-align: center; }
  .initials-placeholder { font-size: 10px; color: #ccc; text-align: center; line-height: 1.3; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 18px 18px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 480px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
  .modal-sub { font-size: 11px; color: #aaa; margin-bottom: 16px; }
  .modal-input { width: 100%; background: #f4f1eb; border: 2px solid #ddd; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; text-align: center; letter-spacing: 4px; text-transform: uppercase; padding: 14px; outline: none; color: #1a1a2e; margin-bottom: 14px; transition: border-color 0.2s; }
  .modal-input:focus { border-color: #f0c040; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn { flex: 1; padding: 14px; border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; border: none; cursor: pointer; }
  .modal-btn-cancel { background: #f4f1eb; color: #888; }
  .modal-btn-confirm { background: #1a1a2e; color: #f0c040; font-weight: 700; }
  .modal-btn-clear { background: #fff0f0; color: #cc4444; border: 1px solid #ffcccc; flex: 0 0 auto; padding: 14px 16px; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ddd; padding: 10px 14px; display: flex; gap: 8px; z-index: 200; }
  .btn { flex: 1; padding: 12px 6px; border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; border: none; cursor: pointer; }
  .btn-reset { background: #f4f1eb; color: #888; border: 1px solid #ddd; }
  .btn-summary { background: #1a1a2e; color: #f0c040; font-weight: 700; }
  .btn-pdf { background: #c0392b; color: #fff; font-weight: 700; }

  .summary-block { display: none; margin: 14px 14px 0; background: #1a1a2e; border-radius: 12px; padding: 16px; }
  .summary-block.show { display: block; }
  .summary-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; color: #f0c040; letter-spacing: 1px; margin-bottom: 10px; }
  .summary-row { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; padding: 5px 0; border-bottom: 1px solid #2a2a3e; gap: 12px; }
  .summary-row span { color: #f0c040; text-align: right; }
  .summary-complete { color: #4dd9ac !important; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #f0c040; font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px 20px; border-radius: 99px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">EOD Field Sign-Off</div>
  <div class="header-date" id="headerDate"></div>
  <div style="font-size:10px;color:#4dd9ac;margin-top:3px;font-family:monospace;">ARA CA — Palmdale Retroreflectivity Survey</div>
  <div class="progress-row">
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-text" id="progText">0/0</div>
  </div>
</div>

<div class="project-bar">
  <span class="project-label">PROJECT:</span>
  <input class="project-input" id="projectInput" type="text" placeholder="Palmdale Retroreflectivity Survey" value="Palmdale Retroreflectivity Survey" maxlength="60" autocomplete="off">
</div>

<div id="summaryBlock" class="summary-block">
  <div class="summary-title">TODAY'S SIGN-OFF SUMMARY</div>
  <div id="summaryContent"></div>
</div>

<div id="root"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Sign Off Item</div>
    <div class="modal-sub" id="modalSub">Enter your initials (2–3 letters)</div>
    <input class="modal-input" id="modalInput" maxlength="3" placeholder="AB" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="modal-btns">
      <button class="modal-btn modal-btn-clear" id="clearBtn" onclick="clearItem()">Clear</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn modal-btn-confirm" onclick="confirmInitials()">Sign Off</button>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn btn-reset" onclick="resetDay()">↺ New Day</button>
  <button class="btn btn-summary" onclick="toggleSummary()">Summary</button>
  <button class="btn btn-pdf" onclick="exportPDF()">🖨 Print / PDF</button>
</div>

<div class="toast" id="toast"></div>

<script>
const ITEMS = [
  { cat: "Surface Pros", items: [
    { id: "sp1",   name: "Surface Pro #1",              sub: "charged & cased" },
    { id: "sp1c",  name: "Surface Pro #1 — Charger",    sub: "packed" },
    { id: "sp2",   name: "Surface Pro #2",              sub: "charged & cased" },
    { id: "sp2c",  name: "Surface Pro #2 — Charger",    sub: "packed" },
  ]},
  { cat: "Battery Bank", items: [
    { id: "bb1",   name: "Big Battery Bank",             sub: "charged" },
    { id: "bb1c",  name: "Battery Bank Cable",           sub: "packed" },
  ]},
  { cat: "RoadVista Guns", items: [
    { id: "rv1",   name: "RoadVista Gun #1",             sub: "secured" },
    { id: "rv2",   name: "RoadVista Gun #2",             sub: "secured" },
  ]},
  { cat: "RoadVista Batteries & Chargers", items: [
    { id: "rvb1",  name: "RoadVista Battery #1",         sub: "on charge" },
    { id: "rvb2",  name: "RoadVista Battery #2",         sub: "on charge" },
    { id: "rvb3",  name: "RoadVista Battery #3",         sub: "on charge" },
    { id: "rvb4",  name: "RoadVista Battery #4",         sub: "on charge" },
    { id: "rvc1",  name: "RoadVista Charger #1",         sub: "plugged in" },
    { id: "rvc2",  name: "RoadVista Charger #2",         sub: "plugged in" },
    { id: "rvd",   name: "RoadVista Data Offload Cable", sub: "packed" },
  ]},
  { cat: "Bikes", items: [
    { id: "bk1",   name: "Bike #1",                      sub: "secured" },
    { id: "bk2",   name: "Bike #2",                      sub: "secured" },
    { id: "bk3",   name: "Bike #3",                      sub: "secured" },
    { id: "bk4",   name: "Bike #4",                      sub: "secured" },
  ]},
  { cat: "Bike Batteries & Chargers", items: [
    { id: "bkb1",  name: "Bike Battery #1",              sub: "on charge" },
    { id: "bkb2",  name: "Bike Battery #2",              sub: "on charge" },
    { id: "bkb3",  name: "Bike Battery #3",              sub: "on charge" },
    { id: "bkb4",  name: "Bike Battery #4",              sub: "on charge" },
    { id: "bkc1",  name: "Bike Charger #1",              sub: "plugged in" },
    { id: "bkc2",  name: "Bike Charger #2",              sub: "plugged in" },
    { id: "bkc3",  name: "Bike Charger #3",              sub: "plugged in" },
    { id: "bkc4",  name: "Bike Charger #4",              sub: "plugged in" },
  ]},
  { cat: "Cameras", items: [
    { id: "cm1",   name: "Camera #1",                    sub: "secured" },
    { id: "cm2",   name: "Camera #2",                    sub: "secured" },
  ]},
  { cat: "Camera Batteries & Charger", items: [
    { id: "cmb1",  name: "Camera Battery #1",            sub: "on charge" },
    { id: "cmb2",  name: "Camera Battery #2",            sub: "on charge" },
    { id: "cmb3",  name: "Camera Battery #3",            sub: "on charge" },
    { id: "cmb4",  name: "Camera Battery #4",            sub: "on charge" },
    { id: "cmc1",  name: "Camera Battery Charger",       sub: "plugged in" },
  ]},
  { cat: "GPS", items: [
    { id: "gp1",   name: "GPS Dongle #1",                sub: "secured" },
    { id: "gp2",   name: "GPS Dongle #2",                sub: "secured" },
    { id: "gpc",   name: "GPS Charging Cable",           sub: "packed" },
  ]},
  { cat: "Bags", items: [
    { id: "bg1",   name: "Tool Bag",                     sub: "packed & inventoried" },
    { id: "bg2",   name: "Misc Bag (cables etc.)",       sub: "packed" },
  ]},
];

const KEY = "eod_signoff_v3";
let state = {};
let activeItemId = null;

function todayKey() { return new Date().toISOString().split("T")[0]; }

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) { const p = JSON.parse(raw); if (p.date === todayKey()) { state = p; return; } }
  } catch(e) {}
  state = { date: todayKey(), signs: {}, project: "" };
  save();
}

function save() {
  state.project = document.getElementById("projectInput").value;
  localStorage.setItem(KEY, JSON.stringify(state));
}

function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";
  ITEMS.forEach(cat => {
    const block = document.createElement("div");
    block.className = "cat-block";
    block.innerHTML = `<div class="cat-label">${cat.cat}</div>`;
    cat.items.forEach(item => {
      const s = state.signs[item.id];
      const signed = !!s;
      const row = document.createElement("div");
      row.className = "item-row" + (signed ? " signed" : "");
      const safeName = item.name.replace(/'/g, "\\'");
      row.innerHTML = `
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-sub">${item.sub}</div>
        </div>
        <div class="initials-box" onclick="openModal('${item.id}','${safeName}')">
          ${signed
            ? `<div class="initials-text">${s.initials}</div><div class="initials-time">${s.time}</div>`
            : `<div class="initials-placeholder">TAP<br>TO<br>SIGN</div>`}
        </div>`;
      block.appendChild(row);
    });
    root.appendChild(block);
  });
  updateProgress();
}

function updateProgress() {
  const all = ITEMS.flatMap(c => c.items.map(i => i.id));
  const done = all.filter(id => state.signs[id]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById("progFill").style.width = pct + "%";
  document.getElementById("progText").textContent = done + "/" + all.length;
}

function openModal(id, name) {
  activeItemId = id;
  const existing = state.signs[id];
  document.getElementById("modalTitle").textContent = name;
  document.getElementById("modalSub").textContent = existing
    ? `Signed by ${existing.initials} at ${existing.time} — update or clear`
    : "Enter your initials to sign off";
  const inp = document.getElementById("modalInput");
  inp.value = existing ? existing.initials : "";
  document.getElementById("clearBtn").style.display = existing ? "block" : "none";
  document.getElementById("modalOverlay").classList.add("open");
  setTimeout(() => inp.focus(), 100);
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  activeItemId = null;
}

function confirmInitials() {
  const val = document.getElementById("modalInput").value.trim().toUpperCase();
  if (!val) return;
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  state.signs[activeItemId] = { initials: val, time };
  save(); render(); closeModal();
}

function clearItem() {
  delete state.signs[activeItemId];
  save(); render(); closeModal();
}

function resetDay() {
  if (!confirm("Start a new day? This clears all sign-offs.")) return;
  state = { date: todayKey(), signs: {}, project: document.getElementById("projectInput").value };
  save(); render();
  document.getElementById("summaryBlock").classList.remove("show");
}

function toggleSummary() {
  const block = document.getElementById("summaryBlock");
  if (block.classList.contains("show")) { block.classList.remove("show"); return; }
  renderSummaryContent();
  block.classList.add("show");
  block.scrollIntoView({ behavior: "smooth" });
}

function renderSummaryContent() {
  const all = ITEMS.flatMap(c => c.items);
  const signed = all.filter(i => state.signs[i.id]);
  const unsigned = all.filter(i => !state.signs[i.id]);
  let html = "";
  if (unsigned.length === 0) {
    html += `<div class="summary-row"><span class="summary-complete">All ${all.length} items signed off!</span></div>`;
  } else {
    html += `<div class="summary-row">Signed off <span>${signed.length} / ${all.length}</span></div>`;
    html += `<div class="summary-row" style="color:#ff8888">Pending <span style="color:#ff8888">${unsigned.map(i=>i.name).join(", ")}</span></div>`;
  }
  const byPerson = {};
  signed.forEach(i => {
    const s = state.signs[i.id];
    if (!byPerson[s.initials]) byPerson[s.initials] = [];
    byPerson[s.initials].push(i.name);
  });
  Object.entries(byPerson).forEach(([initials, items]) => {
    html += `<div class="summary-row">${initials} <span>${items.length} item${items.length>1?'s':''}</span></div>`;
  });
  document.getElementById("summaryContent").innerHTML = html;
}

// ── PDF EXPORT ──────────────────────────────────────────────
function exportPDF() {
  const project = document.getElementById("projectInput").value.trim() || "—";
  const dateStr = new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  const allItems = ITEMS.flatMap(c => c.items);
  const signedCount = allItems.filter(i => state.signs[i.id]).length;
  const total = allItems.length;
  const unsigned = allItems.filter(i => !state.signs[i.id]);
  const byPerson = {};
  allItems.forEach(i => {
    const s = state.signs[i.id];
    if (s) { if (!byPerson[s.initials]) byPerson[s.initials] = 0; byPerson[s.initials]++; }
  });
  const summaryPeople = Object.entries(byPerson).map(([k,v]) => `<strong>${k}</strong>: ${v} items`).join(" &nbsp;|&nbsp; ") || "No sign-offs yet";

  let catRows = "";
  ITEMS.forEach(cat => {
    catRows += `<tr><td colspan="3" class="cat-head">${cat.cat}</td></tr>`;
    cat.items.forEach(item => {
      const s = state.signs[item.id];
      const signed = !!s;
      catRows += `<tr class="${signed ? "signed" : "unsigned"}">
        <td class="dot-cell">${signed ? "●" : "○"}</td>
        <td class="item-cell">${item.name}<span class="sub-text">${item.sub}</span></td>
        <td class="init-cell">${signed ? `<strong>${s.initials}</strong><span class="time-text">${s.time}</span>` : `<span class="none-text">—</span>`}</td>
      </tr>`;
    });
  });

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>EOD Sign-Off – ${dateStr}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 11px; color: #1a1a1a; background: #fff; }
    .report-header { background: #1a1a2e; color: #f0c040; padding: 14px 20px; }
    .report-header h1 { font-size: 16px; margin-bottom: 4px; }
    .report-header .meta { font-size: 10px; color: #aab; }
    .report-header .count { font-size: 12px; color: #4dd9ac; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 0; }
    .cat-head { background: #eef0f8; color: #3c3c64; font-weight: bold; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 10px; border-top: 6px solid #fff; }
    tr.signed td { background: #f0faf4; }
    tr.unsigned td { background: #fff; }
    td { padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .dot-cell { width: 18px; color: #4dd9ac; font-size: 12px; }
    tr.unsigned .dot-cell { color: #ccc; }
    .item-cell { width: 70%; }
    .item-cell .sub-text { display: block; font-size: 9px; color: #aaa; margin-top: 1px; }
    .init-cell { text-align: right; width: 15%; white-space: nowrap; }
    .init-cell strong { font-size: 13px; color: #1a1a2e; display: block; }
    .init-cell .time-text { font-size: 9px; color: #888; }
    .init-cell .none-text { color: #ccc; }
    .summary-box { background: #1a1a2e; color: #ccc; padding: 12px 16px; margin-top: 12px; border-radius: 6px; font-size: 10px; }
    .summary-box h3 { color: #f0c040; font-size: 11px; margin-bottom: 6px; }
    .summary-box .pending { color: #ff8888; margin-top: 4px; }
    .footer { text-align: center; font-size: 9px; color: #bbb; margin-top: 16px; padding-top: 8px; border-top: 1px solid #eee; }
    @media print {
      @page { margin: 12mm; size: letter; }
      body { font-size: 10px; }
      .no-print { display: none !important; }
    }
  </style>
  </head><body>
  <div class="report-header">
    <h1>EOD FIELD SIGN-OFF REPORT</h1>
    <div class="meta">${dateStr} &nbsp;|&nbsp; Project: ${project} &nbsp;|&nbsp; ARA CA</div>
    <div class="count">${signedCount} / ${total} items signed off</div>
  </div>
  <div class="no-print" style="background:#fffbe6;padding:10px 16px;font-size:12px;color:#7a5c00;border-bottom:1px solid #f0d060;">
    ⬇ To save as PDF: <strong>Ctrl+P</strong> (or tap the share/menu icon on mobile) → choose <strong>Save as PDF</strong> → Save
  </div>
  <table>${catRows}</table>
  <div class="summary-box">
    <h3>SUMMARY</h3>
    <div>Signed: ${signedCount}/${total} &nbsp;|&nbsp; Pending: ${unsigned.length}</div>
    <div style="margin-top:4px;">${summaryPeople}</div>
    ${unsigned.length > 0 ? `<div class="pending">Not signed: ${unsigned.map(i=>i.name).join(", ")}</div>` : ""}
  </div>
  <div class="footer">EOD Field Sign-Off &nbsp;|&nbsp; ARA CA &nbsp;|&nbsp; Palmdale Retroreflectivity Survey &nbsp;|&nbsp; ${dateStr}</div>
  </body></html>`;

  const w = window.open("", "_blank");
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

document.getElementById("modalOverlay").addEventListener("click", function(e) { if (e.target === this) closeModal(); });
document.getElementById("modalInput").addEventListener("keydown", function(e) { if (e.key === "Enter") confirmInitials(); });
document.getElementById("projectInput").addEventListener("input", save);

const now = new Date();
document.getElementById("headerDate").textContent = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

load();
if (state.project) document.getElementById("projectInput").value = state.project;
render();
</script>
</body>
</html>
